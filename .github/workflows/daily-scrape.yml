name: Daily filament catalog scrape

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Stealth-Chromium sidecar for stores that block plain HttpClient requests (see
    # docs/adr/0012's "reversing abandon if blocked" addendum) — same image as t2vi/arrgh's
    # docker-compose cloakbrowser service.
    services:
      cloakbrowser:
        image: ghcr.io/t2vi/cloakbrowser-server:latest
        ports:
          - 3000:3000
        env:
          CDP_PORT: "3000"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Test
        run: dotnet test Spoolbook.FilamentSync.Tests/Spoolbook.FilamentSync.Tests.csproj

      - name: Scrape all brands
        env:
          CLOAKBROWSER_WS_URL: http://localhost:3000
        run: |
          mkdir -p data
          dotnet run --project Spoolbook.FilamentSync -- data/filament-catalog.json all

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/filament-catalog.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: refresh filament catalog data"
          git push
