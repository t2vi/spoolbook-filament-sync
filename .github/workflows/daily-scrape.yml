name: Daily filament catalog scrape

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Test
        run: dotnet test Spoolbook.FilamentSync.Tests/Spoolbook.FilamentSync.Tests.csproj

      - name: Scrape all brands
        run: |
          mkdir -p data
          dotnet run --project Spoolbook.FilamentSync -- data/filament-catalog.json all

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/filament-catalog.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: refresh filament catalog data"
          git push
